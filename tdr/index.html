<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Division Resurgence</title>
  <meta name="description" content="Division Resurgence のギアセットと武器タレント一覧" />
  <meta name="theme-color" content="#ff6a00" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <div class="title">Division Resurgence Library</div>
    </div>
  </header>

  <main class="main">
    <section id="content" class="content">
      <section id="gearSection" class="catgroup catgroup--gear prototype-view">
        <div class="prototype-view__meta">
          <strong>ギア</strong>
        </div>
        <div id="gearGrid" class="grid grid--gear tdr-grid"></div>
      </section>

      <section id="talentSection" class="catgroup catgroup--gear prototype-view">
        <div class="prototype-view__meta">
          <strong>武器タレント</strong>
        </div>
        <div id="talentGrid" class="grid grid--gear tdr-grid"></div>
      </section>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__line">
      <span class="footer__credit">Division Resurgence items viewer</span>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
